services:
    db:
        image: mysql:8.0
        container_name: hellforge-db
        restart: unless-stopped
        env_file:
            - ./backend/.env
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-falafel}
            MYSQL_DATABASE: ${DB_NAME:-hellforge_db}
        ports:
            - '3939:3306'
        volumes:
            - db_data:/var/lib/mysql
            - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: hellforge-phpmyadmin
        restart: unless-stopped
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_USER: root
            PMA_PASSWORD: ${DB_PASSWORD:-falafel}
        ports:
            - '8080:80'
        depends_on:
            - db

volumes:
    db_data:
